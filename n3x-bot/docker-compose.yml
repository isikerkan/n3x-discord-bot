services:
  bot:
    build: .
    env_file: .env
    environment:
      # Compose's `environment:` always wins over `env_file:` for the same
      # key, so this guarantees the flatfile backend writes inside the
      # bot-data volume (mounted below) even if .env still has the bare
      # "stats.json" default. To use a different in-volume path, edit this
      # value directly (a plain DATA_FILE in .env will NOT override it).
      DATA_FILE: data/stats.json
    volumes:
      - bot-data:/app/data      # persists sqlite/flatfile
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: n3x
      POSTGRES_PASSWORD: n3x
      POSTGRES_DB: n3x
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n3x"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  bot-data:
  pg-data:
