services:
  bot:
    build: .
    env_file: .env
    volumes:
      - bot-data:/app/data      # persists sqlite/flatfile
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: n3x
      POSTGRES_PASSWORD: n3x
      POSTGRES_DB: n3x
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n3x"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  bot-data:
  pg-data:
